<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Inverteca Core - Bloque 3</title>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root {
            --primary: #27ae60;
            --secondary: #f39c12;
            --danger: #e74c3c;
            --warning: #e67e22;
            --info: #3498db;
            --bg: #f4f7f6;
            --card: #ffffff;
            --text: #2c3e50;
        }

        * { box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); margin: 0; padding: 10px; display: flex; flex-direction: column; align-items: center; min-height: 100vh; }
        .app-card { background: var(--card); width: 100%; max-width: 500px; border-radius: 20px; box-shadow: 0 10px 25px rgba(0,0,0,0.1); padding: 20px; margin-bottom: 20px; }
        .header-info { background: linear-gradient(135deg, var(--primary), var(--info)); color: white; padding: 15px; border-radius: 15px; margin-bottom: 20px; text-align: center; cursor: pointer; }
        .header-info h2 { margin: 0 0 10px 0; font-size: 1.2rem; }
        .header-info p { margin: 5px 0; font-size: 0.9rem; }
        .status-badge { display: inline-block; background: rgba(255,255,255,0.3); padding: 5px 15px; border-radius: 20px; font-size: 0.85rem; margin-top: 10px; }
        .connection-status { display: inline-block; margin-left: 10px; font-size: 0.75rem; padding: 3px 8px; border-radius: 10px; color: white; }
        .connection-status.online { background: #2ecc71; }
        .connection-status.offline { background: #e74c3c; }
        .tabs { display: flex; gap: 10px; margin-bottom: 20px; border-bottom: 2px solid #eee; overflow-x: auto; padding-bottom: 5px; }
        .tab-btn { background: none; border: none; padding: 10px 15px; cursor: pointer; font-weight: 600; color: #999; border-bottom: 3px solid transparent; transition: all 0.3s; white-space: nowrap; }
        .tab-btn.active { color: var(--primary); border-bottom-color: var(--primary); }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        h2 { color: var(--text); font-size: 1.1rem; margin-top: 20px; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .input-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: 600; color: #555; font-size: 0.9rem; }
        input, select { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; outline: none; transition: border-color 0.3s; }
        input:focus, select:focus { border-color: var(--primary); }
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-top: 15px; }
        button { border: none; padding: 12px; border-radius: 10px; color: white; font-weight: bold; cursor: pointer; font-size: 0.85rem; transition: all 0.3s; }
        button:active { transform: scale(0.95); }
        .btn-add { background: var(--primary); }
        .btn-vender { background: var(--secondary); }
        .btn-danger { background: var(--danger); }
        .btn-info { background: var(--info); }
        .btn-camera { background: #9b59b6; padding: 8px 12px; font-size: 0.8rem; margin-left: 5px; }
        .list-container { margin-top: 20px; max-height: 400px; overflow-y: auto; }
        .item { background: #f9f9f9; padding: 12px; border-radius: 10px; margin-bottom: 10px; border-left: 4px solid var(--primary); position: relative; }
        .item.alert { border-left-color: var(--danger); background: #fff5f5; }
        .item-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
        .item-name { font-weight: bold; color: var(--text); }
        .item-quantity { background: var(--primary); color: white; padding: 3px 8px; border-radius: 5px; font-size: 0.8rem; }
        .stats-box { background: #f9f9f9; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 4px solid var(--info); }
        .stats-label { font-size: 0.85rem; color: #666; margin-bottom: 5px; }
        .stats-value { font-size: 1.4rem; font-weight: bold; color: var(--info); }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); align-items: center; justify-content: center; z-index: 1000; padding: 10px; }
        .modal.active { display: flex; }
        .modal-content { background: white; padding: 20px; border-radius: 15px; max-width: 450px; width: 100%; box-shadow: 0 10px 40px rgba(0,0,0,0.3); max-height: 90vh; overflow-y: auto; }
        .search-input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; outline: none; margin-bottom: 10px; }
        .search-results { max-height: 200px; overflow-y: auto; border: 1px solid #eee; border-radius: 10px; margin-bottom: 15px; }
        .search-result-item { padding: 10px; border-bottom: 1px solid #eee; cursor: pointer; display: flex; justify-content: space-between; align-items: center; }
        .total-section { background: var(--primary); color: white; padding: 15px; border-radius: 15px; text-align: center; margin-top: 15px; }
        .total-amount { font-size: 1.8rem; font-weight: bold; }
        .config-section { background: #f0f0f0; border-radius: 10px; padding: 15px; margin-bottom: 15px; border-left: 4px solid #3498db; }
        .qty-controls { display: flex; align-items: center; gap: 8px; margin-top: 10px; }
        .btn-qty { width: 30px; height: 30px; padding: 0; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; background: #eee; color: #333; border-radius: 5px; }
        .btn-add-search { background: var(--secondary); padding: 5px 10px; font-size: 0.7rem; }
        .item-actions { display: flex; gap: 5px; margin-top: 10px; }
        .btn-edit { background: var(--info); padding: 5px 10px; font-size: 0.75rem; }
        .btn-delete { background: var(--danger); padding: 5px 10px; font-size: 0.75rem; }
        .costo-preview { font-size: 0.75rem; color: var(--info); margin-top: 4px; font-weight: 600; }
        .price-dual { font-size: 0.75rem; color: #666; margin-top: 2px; }
        #qrcode { margin: 20px auto; display: flex; justify-content: center; }
        .unit-badge { font-size: 0.65rem; background: #eee; padding: 2px 5px; border-radius: 4px; color: #666; margin-left: 5px; }
        .anulada { text-decoration: line-through; opacity: 0.5; }
        .btn-anular { background: var(--danger); padding: 3px 8px; font-size: 0.65rem; border-radius: 5px; margin-top: 5px; }
        .cierre-item { border-left-color: var(--secondary); background: #fff9f0; }
        .falla-badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; font-weight: bold; color: white; }
        .agotado { background: #e74c3c; }
        .bajo { background: #f39c12; }
        .switch-container { display: flex; align-items: center; justify-content: space-between; margin-bottom: 10px; background: #f9f9f9; padding: 10px; border-radius: 10px; }
        .switch { position: relative; display: inline-block; width: 40px; height: 20px; }
        .switch input { opacity: 0; width: 0; height: 0; }
        .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background-color: #ccc; transition: .4s; border-radius: 20px; }
        .slider:before { position: absolute; content: ""; height: 16px; width: 16px; left: 2px; bottom: 2px; background-color: white; transition: .4s; border-radius: 50%; }
        input:checked + .slider { background-color: var(--primary); }
        input:checked + .slider:before { transform: translateX(20px); }
        .detail-row { display: flex; justify-content: space-between; font-size: 0.85rem; margin-bottom: 3px; }
        .exento-badge { font-size: 0.6rem; background: #9b59b6; color: white; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }
        .section-toggle { background: none; border: none; cursor: pointer; padding: 0; margin-right: 10px; font-size: 1.2rem; color: var(--primary); transition: transform 0.3s; }
        .section-toggle.collapsed { transform: rotate(-90deg); }
        .section-header { display: flex; align-items: center; margin-top: 20px; margin-bottom: 15px; border-bottom: 2px solid var(--primary); padding-bottom: 10px; }
        .section-header h2 { margin: 0; flex: 1; color: var(--text); font-size: 1.1rem; }
        .section-content { display: block; }
        .section-content.hidden { display: none; }
        .provider-filter-input { width: 100%; padding: 12px; border: 2px solid #eee; border-radius: 10px; font-size: 16px; outline: none; margin-bottom: 10px; }
        .provider-filter-input:focus { border-color: var(--primary); }
        .provider-dropdown { max-height: 250px; overflow-y: auto; border: 2px solid #eee; border-radius: 10px; background: white; }
        .provider-option { padding: 12px; border-bottom: 1px solid #eee; cursor: pointer; transition: background 0.2s; }
        .provider-option:hover { background: #f0f8ff; }
        .provider-option.selected { background: #e8f5e9; border-left: 4px solid var(--primary); }
        .input-row-two { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 10px; }
        @media (max-width: 600px) { .input-row-two { grid-template-columns: 1fr; } }
        .barcode-badge { font-size: 0.65rem; background: #16a085; color: white; padding: 2px 5px; border-radius: 4px; margin-left: 5px; }
        .camera-container { display: flex; gap: 5px; align-items: center; margin-bottom: 10px; }
        #qr-reader { width: 100%; max-width: 400px; margin: 10px auto; }
        .qr-reader-status { text-align: center; font-size: 0.85rem; color: #666; margin: 10px 0; }
        #qr-reader-inventario, #qr-reader-ventas { width: 100%; margin: 10px 0; }
        #qr-status-inventario, #qr-status-ventas { text-align: center; font-size: 0.85rem; color: #666; margin: 10px 0; font-weight: bold; }
        /* Estilos AGRESIVOS para html5-qrcode - Fuerza Bruta Visual */
        .html5-qrcode-element { width: 100% !important; background: transparent !important; }
        .html5-qrcode { width: 100% !important; background: transparent !important; }
        .html5-qrcode video { width: 100% !important; height: auto !important; }
        .html5-qrcode__scan-region { border: 3px solid var(--primary) !important; border-radius: 10px !important; }
        .html5-qrcode__camera-selection { margin: 10px 0 !important; background: transparent !important; }
        .html5-qrcode__camera-selection select { width: 100% !important; padding: 10px !important; border: 2px solid var(--primary) !important; border-radius: 8px !important; background: white !important; color: #333 !important; font-weight: bold !important; }
        .html5-qrcode__camera-selection label { color: #333 !important; font-weight: bold !important; margin-bottom: 5px !important; display: block !important; }
        .html5-qrcode__status { color: #333 !important; font-weight: bold !important; background: transparent !important; }
        .html5-qrcode__bottom-section { margin-top: 10px !important; background: transparent !important; }
        /* Estilos para botones - MÁXIMA PRIORIDAD */
        .html5-qrcode-button, button[id*="html5-qrcode"], div[id*="html5-qrcode"] button { 
            background: var(--primary) !important; 
            color: white !important; 
            border: none !important; 
            padding: 10px 15px !important; 
            border-radius: 8px !important; 
            font-weight: bold !important; 
            cursor: pointer !important; 
            margin: 5px !important; 
            font-size: 0.9rem !important;
            text-transform: none !important;
        }
        .html5-qrcode-button:hover, button[id*="html5-qrcode"]:hover, div[id*="html5-qrcode"] button:hover { 
            background: #1e8449 !important; 
        }
        .html5-qrcode-button:active, button[id*="html5-qrcode"]:active, div[id*="html5-qrcode"] button:active { 
            transform: scale(0.95) !important; 
        }
        /* Forzar estilos en TODOS los botones del scanner */
        #qr-reader-inventario button, #qr-reader-ventas button {
            background: var(--primary) !important;
            color: white !important;
            padding: 10px 15px !important;
            border-radius: 8px !important;
            font-weight: bold !important;
            border: none !important;
            cursor: pointer !important;
            font-size: 0.9rem !important;
        }
        #qr-reader-inventario button:hover, #qr-reader-ventas button:hover {
            background: #1e8449 !important;
        }
        /* Eliminar fondos grises */
        #qr-reader-inventario, #qr-reader-ventas { background: transparent !important; }
        #qr-reader-inventario > *, #qr-reader-ventas > * { background: transparent !important; }
        /* Estilos para toda la interfaz interna */
        [id*="html5-qrcode"] { background: transparent !important; }
        [class*="html5-qrcode"] { background: transparent !important; }
    </style>
</head>
<body>
    <div class="app-card">
        <div class="header-info">
            <h2 id="nombreNegocioDisplay">Cargando...</h2>
            <div class="status-badge">
                <span id="fechaActual"></span>
                <span id="connectionStatus" class="connection-status">DESCONECTADO</span>
            </div>
        </div>

        <div class="tabs">
            
        <button id="tab-inventario" class="tab-btn" onclick="switchTab('inventario')" data-manus_clickable="true" data-manus_click_id="2">📦 Stock</button>
        <button id="tab-ventas" class="tab-btn" onclick="switchTab('ventas')" data-manus_clickable="true" data-manus_click_id="3">🛒 Venta</button>
        <button id="tab-creditos" class="tab-btn" onclick="switchTab('creditos')" data-manus_clickable="true" data-manus_click_id="4">💳 Créditos</button>
        <button id="tab-proveedores" class="tab-btn" onclick="switchTab('proveedores')" data-manus_clickable="true" data-manus_click_id="5">🏢 Prov.</button>
        <button id="tab-gastos" class="tab-btn" onclick="switchTab('gastos')" data-manus_clickable="true" data-manus_click_id="6">💸 Gastos</button>
        <button id="tab-reportes" class="tab-btn" onclick="switchTab('reportes')" data-manus_clickable="true" data-manus_click_id="7">📊 Rep.</button>
    
        <!--
            <button id="tab-inventario" class="tab-btn active" onclick="switchTab('inventario')">📦 STOCK</button>
            <button id="tab-ventas" class="tab-btn" onclick="switchTab('ventas')">🛒 VENTA</button>
            <button id="tab-reportes" class="tab-btn" onclick="switchTab('reportes')">📊 INFO</button>
        -->
        </div>
        <div id="inventario" class="tab-content active">
            <h2>📦 Gestión de Inventario</h2>
            <div class="input-group"><label>Nombre del Producto</label><input type="text" id="nombre" placeholder="Ej: Harina Pan"></div>
            <div class="btn-grid">
                <div class="input-group"><label>Costo (Bs.)</label><input type="number" id="costo" step="0.01"></div>
                <div class="input-group"><label>Cantidad</label><input type="number" id="cantidad" value="1"></div>
            </div>
            <div class="input-group">
                <label>Unidad</label>
                <select id="unidad"><option value="UNID">Unidad (Pza)</option><option value="KG">Kilogramos (Kg)</option></select>
            </div>
            <button class="btn-add" onclick="addItem()" style="width:100%">+ AGREGAR AL STOCK</button>
            <div class="total-section"><div>VALOR TOTAL DEL STOCK</div><div class="total-amount" id="totalDisplay">Bs. 0,00</div></div>
            <div id="lista" class="list-container"></div>
        </div>

        <!-- TAB: VENTAS -->
        <div id="ventas" class="tab-content">
            <h2>🛒 Punto de Venta</h2>
            <div class="input-group">
                <label>Buscar Producto</label>
                <input type="text" id="busquedaProducto" placeholder="Nombre o Código..." oninput="buscarProducto(this.value)">
            </div>
            <div id="searchResults" class="list-container" style="max-height:150px; margin-bottom:20px;"></div>
            
            <h3>🛒 Carrito</h3>
            <div id="listaCarrito" class="list-container" style="max-height:200px;"></div>
            
            <div class="total-section" style="background:var(--info)">
                <div>TOTAL A COBRAR</div>
                <div class="total-amount" id="totalCarritoDisplay">Bs. 0,00</div>
                <div id="totalCarritoUSD" style="font-size:0.9rem; opacity:0.8;">$ 0.00</div>
            </div>
            
            <div class="btn-grid">
                <button class="btn-vender" onclick="finalizarVenta(false)">💵 CONTADO</button>
                <button class="btn-info" onclick="abrirModalCredito()">💳 CRÉDITO</button>
            </div>
        </div>

        <!-- TAB: REPORTES -->
        <div id="reportes" class="tab-content">
            <h2>📊 Resumen del Día</h2>
            <div class="stats-box"><div class="stats-label">Ventas Totales</div><div class="stats-value" id="ingresosTotales">Bs. 0,00</div></div>
            <div class="stats-box" style="border-left-color:var(--secondary)"><div class="stats-label">Ganancia Estimada</div><div class="stats-value" id="gananciaEstimada">Bs. 0,00</div></div>
            <button class="btn-danger" style="width:100%; margin-top:20px;" onclick="alert('Cierre de caja próximamente')">🔒 CERRAR CAJA</button>
        </div>
    </div>

    

    <div id="modalCredito" class="modal">
        <div class="modal-content">
            <h3>💳 Registrar Crédito</h3>
            <div class="input-group">
                <label>Cédula del Cliente:</label>
                <input type="text" id="cedulaCliente" placeholder="V-12345678" list="listaClientesSugeridos" onchange="buscarClientePorCedula(this.value)" style="">
                <datalist id="listaClientesSugeridos"></datalist>
            </div>





    <div id="debug-log"></div>

    <script>
    let items = [];
        let tasaDolar = 36.50;
        let diaActual = new Date().toLocaleDateString('es-ES');
        let currentTab = 'inventario';
        let db = null;
        let configMaestra = {
            idActual: '',
            pathCliente: '',
            nombreNegocio: 'Inverteca Core'
        };

        
        let carrito = [];
        let ventas = [];
        let creditos = [];
        let gastosOperativos = [];
        let cierres = [];
        let ivaPorcentaje = 16;

        function fM(num) {
            return parseFloat(num || 0).toLocaleString('es-VE', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        // --- BÚSQUEDA Y CARRITO ---
        function buscarProducto(val) {
            const res = document.getElementById('searchResults');
            res.innerHTML = '';
            if(!val) return;
            
            const filtro = val.toLowerCase();
            const filtrados = items.filter(i => i.nombre.toLowerCase().includes(filtro) || (i.codigo && i.codigo.includes(filtro)));
            
            filtrados.forEach(i => {
                const div = document.createElement('div');
                div.className = 'item';
                div.style.cursor = 'pointer';
                div.innerHTML = `<strong>${i.nombre}</strong> - Bs. ${fM(i.costo * 1.3)} <small>(${i.cantidad} disp)</small>`;
                div.onclick = () => agregarAlCarrito(i);
                res.appendChild(div);
            });
        }

        function agregarAlCarrito(item) {
            const existe = carrito.find(c => c.id === item.id);
            if(existe) {
                existe.q++;
            } else {
                carrito.push({
                    id: item.id,
                    nombre: item.nombre,
                    precioVenta: item.costo * 1.3,
                    costo: item.costo,
                    q: 1,
                    unidad: item.unidad || 'UNID',
                    exento: item.exento || false
                });
            }
            log("🛒 Añadido al carrito: " + item.nombre);
            render();
        }

        function quitarDelCarrito(index) {
            carrito.splice(index, 1);
            render();
        }

        function finalizarVenta(esCredito = false) {
            if(!carrito.length) return alert("Carrito vacío");
            
            let totalVenta = 0;
            let gananciaVenta = 0;
            let detalle = "";

            carrito.forEach(c => {
                const subtotal = c.precioVenta * c.q;
                totalVenta += subtotal;
                gananciaVenta += (c.precioVenta - c.costo) * c.q;
                detalle += `${c.q} ${c.nombre}, `;
                
                // Descontar Stock
                const itemOriginal = items.find(i => i.id === c.id);
                if(itemOriginal) itemOriginal.cantidad -= c.q;
            });

            const nuevaVenta = {
                id: Date.now(),
                producto: detalle.slice(0, -2),
                total: totalVenta,
                ganancia: gananciaVenta,
                dia: diaActual,
                hora: new Date().toLocaleTimeString(),
                tipo: esCredito ? 'credito' : 'contado'
            };

            ventas.push(nuevaVenta);
            
            // Guardar en Firebase (Rutas dinámicas)
            db.ref(configMaestra.pathCliente + 'data/items').set(items);
            db.ref(configMaestra.pathCliente + 'logs/ventas').push(nuevaVenta);
            
            log("💰 Venta finalizada: Bs. " + fM(totalVenta));
            carrito = [];
            render();
            if(esCredito) cerrarModalCredito();
            alert("Venta procesada con éxito");
        }

        // --- MODALES ---
        function abrirModalCredito() {
            if(!carrito.length) return alert("Carrito vacío");
            document.getElementById('modalCredito').style.display = 'block';
            let total = 0;
            carrito.forEach(c => total += (c.precioVenta * c.q));
            document.getElementById('montoCredito').textContent = "Bs. " + fM(total);
        }
        function cerrarModalCredito() { document.getElementById('modalCredito').style.display = 'none'; }


        function log(msg) {
            const el = document.getElementById('debug-log');
            if(el) {
                el.innerHTML += `<div>> ${msg}</div>`;
                el.scrollTop = el.scrollHeight;
            }
            console.log(msg);
        }

        function switchTab(tabId) {
            document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.getElementById(tabId).classList.add('active');
            document.getElementById('tab-' + tabId).classList.add('active');
            currentTab = tabId;
            render();
        }

        window.onload = function() {
            document.getElementById('fechaActual').textContent = diaActual;
            const urlParams = new URLSearchParams(window.location.search);
            let clienteId = urlParams.get('id') || "c001angeles";
            configMaestra.idActual = clienteId;
            configMaestra.pathCliente = 'clientes/' + clienteId + '/';
            inicializarFirebase();
        };

        function inicializarFirebase() {
            const firebaseConfig = {
                apiKey: "AIzaSyD5sWhgWQ5RfIIzn_vAlZi9Zdp-7lwUSFc",
                authDomain: "inverteca-core.firebaseapp.com",
                databaseURL: "https://inverteca-core-default-rtdb.firebaseio.com",
                projectId: "inverteca-core",
                storageBucket: "inverteca-core.firebasestorage.app",
                messagingSenderId: "647568711575",
                appId: "1:647568711575:web:d09efc868294c96b0aeed2"
            }
    
    // --- LÓGICA DE NEGOCIO COMPLETA ---
    
    // --- MOTOR INVERTECA-CORE MULTI-TENANT v3.0 ---
    let db = null;
    let firebaseConnected = false;

    // Función para detectar ventas de días anteriores sin cerrar
    function detectarVentasPendientes() {
        const hoy = new Date().toLocaleDateString('es-ES');
        const ventasAnteriores = ventas.filter(v => v.dia !== hoy && !v.anulada);
        const diasPendientes = [...new Set(ventasAnteriores.map(v => v.dia))];
        
        if(diasPendientes.length > 0) {
            console.log('⚠️ ALERTA: Ventas pendientes de cierre de días anteriores:', diasPendientes);
            const mensaje = `Se detectaron ventas sin cerrar de ${diasPendientes.length} día(s) anterior(es):\n${diasPendientes.join(', ')}\n\n¿Deseas proceder a cerrar esos días ahora?`;
            if(confirm(mensaje)) {
                cerrarDiasAnteriores(diasPendientes);
            }
        }
    }
    
    // Función para cerrar múltiples días anteriores
    function cerrarDiasAnteriores(dias) {
        dias.forEach(dia => {
            const vDia = ventas.filter(v => v.dia === dia && !v.anulada);
            if(vDia.length > 0) {
                let ing = 0, gan = 0, iva = 0, costos = 0;
                vDia.forEach(v => { ing += v.total; gan += v.ganancia; iva += (v.ivaMonto || 0); });
                
                const costosDelDia = gastosOperativos.filter(c => c.fecha === dia);
                costosDelDia.forEach(c => { costos += c.monto; });
                
                const gananciaNeta = gan - costos;
                
                cierres.push({ 
                    fecha: dia, 
                    ingresos: ing, 
                    iva: iva, 
                    ganancia: gan,
                    gastosOperativos: costos,
                    gananciaNeta: gananciaNeta,
                    tipo: 'DIARIO',
                    cerradoAutomaticamente: true
                });
                
                console.log('✅ Cierre automático registrado para', dia, '- Ganancia Neta: Bs.', fM(gananciaNeta));
            }
        });
        
        // Limpiar ventas y gastos de esos días
        dias.forEach(dia => {
            ventas = ventas.filter(v => v.dia !== dia);
            gastosOperativos = gastosOperativos.filter(c => c.fecha !== dia);
        });
        
        sync();
        render();
        alert('✅ Cierres retroactivos completados. Los datos han sido procesados correctamente.');
    }

    function generarArchivoCliente() {
        // 1. Obtener los datos actuales del panel
        const version = document.getElementById('devVersion').value;
        const limite = document.getElementById('devLimiteDispositivos').value;
        const path = document.getElementById('devPathCliente').value.trim();
        const dbUrl = document.getElementById('devDbUrl').value.trim();
        const apiKey = document.getElementById('devApiKey').value.trim();
        const claveM = document.getElementById('devClaveMaestra').value.trim();
        
        const nombreN = document.getElementById('devNombreNegocio').value.trim();
        const rifN = document.getElementById('devRifNegocio').value.trim();
        const dirN = document.getElementById('devDireccionNegocio').value.trim();
        const telN = document.getElementById('devTelefonoNegocio').value.trim();
        const ultF = document.getElementById('devUltimaFactura').value || 0;
        const iconoU = document.getElementById('devIconoUrl').value.trim();

        if(!dbUrl || !apiKey || !path) {
            alert("⚠️ Por favor, completa la URL de Firebase, la API Key y el Path del Cliente antes de generar.");
            return;
        }

        // 2. Obtener el código fuente de la página actual usando el DOM
        // Usamos outerHTML del documento completo para evitar problemas de seguridad con fetch local
        let htmlContent = document.documentElement.outerHTML;
        htmlContent = "<!DOCTYPE html>\n<html lang=\"es\">\n" + htmlContent + "\n</html>";

        // 3. Inyectar la configuración en el bloque CONFIG_ENTREGA usando Regex
        const regexConfig = /const CONFIG_ENTREGA = \{[\s\S]*?\};/;
        const nuevaConfig = `const CONFIG_ENTREGA = {
        dbUrl: '${dbUrl}',
        apiKey: '${apiKey}',
        pathCliente: '${path}',
        version: '${version}',
        limiteDispositivos: ${limite},
        claveMaestra: '${claveM}',
        nombreNegocio: '${nombreN}',
        rifNegocio: '${rifN}',
        direccionNegocio: '${dirN}',
        telefonoNegocio: '${telN}',
        ultimaFactura: ${ultF},
        iconoUrl: '${iconoU}'
    };`;

        let finalHtml = htmlContent.replace(regexConfig, nuevaConfig);

        // 4. Asegurar que el modal esté cerrado en el código generado
        // Limpiamos cualquier rastro de 'active' en el modal maestro
        finalHtml = finalHtml.replace(/id="modalMaestro" class="modal active"/g, 'id="modalMaestro" class="modal"');
        
        // 5. Limpiar valores temporales del DOM que se inyectaron en el outerHTML
        // Esto evita que el archivo generado lleve los valores que escribiste en los inputs visualmente
        const regexInputs = /value="[^"]*"/g;
        // No limpiamos todos los values porque borraríamos botones, pero sí los de los inputs de texto
        // Para ser más seguros, simplemente dejamos que el script init() sobrescriba todo al arrancar

        // 6. Crear el archivo y descargarlo
        const blob = new Blob([finalHtml], { type: 'text/html' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        const nombreArchivo = `ControlViveres_${path.replace(/[^a-z0-9]/gi, '_')}.html`;
        
        a.href = url;
        a.download = nombreArchivo;
        document.body.appendChild(a);
        a.click();

            cameraInventarioActive = false;
        }

    function personalizarBotonesEscaner(containerId) {
        const container = document.getElementById(containerId);
        if(!container) return;
        
        // Diccionario de traducciones - COMPLETO
        const traducciones = {
            'start scanning': 'Iniciar Escaneo',
            'start': 'Iniciar Escaneo',
            'stop scanning': 'Detener Escaneo',
            'stop': 'Detener Escaneo',
            'torch on': '💡 Linterna ON',
            'torch off': '💡 Linterna OFF',
            'camera permission request': 'Solicitar Permiso de Cámara',
            'request camera permission': 'Solicitar Permiso de Cámara',
            'select camera': 'Elegir Cámara',
            'camera facing back': 'Cámara Trasera',
            'camera facing front': 'Cámara Frontal',
            'back': 'Cámara Trasera',
            'front': 'Cámara Frontal',
            'environment': 'Cámara Trasera',
            'user': 'Cámara Frontal'
        };
        
        // Función para aplicar estilos y traducciones
        const aplicarEstilos = () => {
            // Cambiar textos y estilos de botones
            const botones = container.querySelectorAll('button');
            botones.forEach(btn => {
                const textoOriginal = btn.textContent.toLowerCase().trim();
                
                // Buscar traducción - MÁS AGRESIVA
                let traducido = false;
                for(let [ingles, espanol] of Object.entries(traducciones)) {
                    if(textoOriginal.includes(ingles.toLowerCase())) {
                        btn.textContent = espanol;
                        traducido = true;
                        break;
                    }
                }
                
                // Si no se tradujo, intentar con palabras clave
                if(!traducido) {
                    if(textoOriginal.includes('scan') || textoOriginal.includes('start')) {
                        btn.textContent = 'Iniciar Escaneo';
                    } else if(textoOriginal.includes('stop')) {
                        btn.textContent = 'Detener Escaneo';
                    } else if(textoOriginal.includes('torch')) {
                        btn.textContent = '💡 Linterna';
                    } else if(textoOriginal.includes('camera') || textoOriginal.includes('select')) {
                        btn.textContent = 'Elegir Cámara';
                    }
                }
                
                // Aplicar estilos
                if(btn.textContent.includes('Detener')) {
                    btn.style.background = '#e74c3c';
                } else if(btn.textContent.includes('Linterna')) {
                    btn.style.background = '#f39c12';
                } else {
                    btn.style.background = '#27ae60';
                }
                btn.style.color = 'white';
                btn.style.padding = '10px 15px';
                btn.style.borderRadius = '8px';
                btn.style.fontWeight = 'bold';
                btn.style.border = 'none';
                btn.style.cursor = 'pointer';
                btn.style.fontSize = '0.9rem';
            });
            
            // Cambiar etiquetas
            const labels = container.querySelectorAll('label');
            labels.forEach(label => {
                const textoLabel = label.textContent.toLowerCase();
                if(textoLabel.includes('camera')) {
                    label.textContent = 'Elegir Cámara:';
                    label.style.fontWeight = 'bold';
                    label.style.color = '#333';
                }
            });
            
            // Cambiar opciones de cámara
            const selects = container.querySelectorAll('select');
            selects.forEach(select => {
                const options = select.querySelectorAll('option');
                options.forEach(opt => {
                    const textoOpt = opt.textContent.toLowerCase();
                    if(textoOpt.includes('back') || textoOpt.includes('environment')) {
                        opt.textContent = 'Cámara Trasera';
                    } else if(textoOpt.includes('front') || textoOpt.includes('user')) {
                        opt.textContent = 'Cámara Frontal';
                    }
                });
            });
            
            // Nota: Eliminamos la búsqueda de fondos grises para optimizar rendimiento
        };
        
        // Aplicar estilos UNA SOLA VEZ
        aplicarEstilos();
        
        // Reintentar cada 200ms durante 2 segundos (para botones que aparecen tarde)
        let intentos = 0;
        const intervalo = setInterval(() => {
            aplicarEstilos();
            intentos++;
            if(intentos > 10) clearInterval(intervalo);
        }, 200);
    }

                "qr-reader-proveedores",
                { 
                    fps: 10, 
                    qrbox: { width: 250, height: 250 }, 
                    rememberLastUsedCamera: true, 
                    showTorchButtonIfSupported: true,
                    aspectRatio: 1.0,
                    formatsToSupport: [Html5QrcodeSupportedFormats.QR_CODE, Html5QrcodeSupportedFormats.CODE_128, Html5QrcodeSupportedFormats.CODE_39, Html5QrcodeSupportedFormats.EAN_13]
                },
                false
            );
            
            scannerProveedores.render(onScanSuccessProveedores, onScanErrorProveedores);
            
            setTimeout(() => {
                personalizarBotonesEscaner();
                cameraProveedoresActive = true;
            }, 500);
        } catch(e) {
            console.error('Error al inicializar escáner:', e);
            statusDiv.textContent = 'Error: ' + e.message;
        }
    }

    function closeCameraProveedores() {
        if(scannerProveedores) {
            try {
                scannerProveedores.clear();
                document.getElementById('qr-reader-proveedores').style.display = 'none';
                document.getElementById('qr-reader-proveedores').innerHTML = '';
                document.getElementById('qr-status-proveedores').textContent = '';
                cameraProveedoresActive = false;
                scannerProveedores = null;
            } catch(e) {
                console.error('Error al cerrar scanner:', e);
                document.getElementById('qr-reader-proveedores').style.display = 'none';
                document.getElementById('qr-reader-proveedores').innerHTML = '';
                document.getElementById('qr-status-proveedores').textContent = '';
                cameraProveedoresActive = false;
                scannerProveedores = null;
            }
        }
    }

    function onScanSuccessProveedores(decodedText) {
        document.getElementById('skuFactura').value = decodedText;
        // Búsqueda EXACTA primero, luego flexible
        const codigoLimpio = decodedText.replace(/\s/g, '');
        
        // Intenta búsqueda exacta primero
        let producto = items.find(i => {
            const codigoInventario = (i.codigoBarras || '').replace(/\s/g, '');
            return codigoInventario === codigoLimpio;
        });
        
        // Si no encuentra exacto, busca parcial (pero solo si tiene código)
        if(!producto && codigoLimpio.length >= 5) {
            producto = items.find(i => {
                const codigoInventario = (i.codigoBarras || '').replace(/\s/g, '');
                return codigoInventario.includes(codigoLimpio) || codigoLimpio.includes(codigoInventario);
            });
        }
        
        if(producto && producto.codigoBarras) {
            document.getElementById('productoFactura').value = producto.nombre;
            document.getElementById('costoUnitarioFactura').value = (producto.costo * tasaDolar).toFixed(2);
            document.getElementById('monedaCostoFactura').value = 'BS';
            document.getElementById('qr-status-proveedores').textContent = '✓ Producto encontrado: ' + producto.nombre;
            document.getElementById('qr-status-proveedores').style.color = '#27ae60';
            document.getElementById('productoSugerencia').style.display = 'block';
            document.getElementById('searchResultsFactura').innerHTML = '';
        } else {
            document.getElementById('productoFactura').value = '';
            document.getElementById('costoUnitarioFactura').value = '';
            document.getElementById('monedaCostoFactura').value = 'BS';
            document.getElementById('qr-status-proveedores').textContent = '⚠️ Codigo: ' + decodedText + ' (nuevo producto - ingresa nombre)';
            document.getElementById('qr-status-proveedores').style.color = '#f39c12';
            document.getElementById('productoSugerencia').style.display = 'none';
            document.getElementById('searchResultsFactura').innerHTML = '';
        }
        
        setTimeout(() => closeCameraProveedores(), 500);
    }

    function onScanErrorProveedores(error) {
        // Silenciar errores
    }

    function onScanSuccessVentas(decodedText) {
        // Poner el código en la casilla específica
        document.getElementById('codigoBarrasVenta').value = decodedText;
        document.getElementById('qr-status-ventas').textContent = '✓ Código detectado: ' + decodedText;
        
        console.log('📱 Escáner activado - Código:', decodedText);
        
        // Buscar por SKU y añadir directamente
        buscarVentaPorCodigo(decodedText);

        setTimeout(() => closeCameraVentas(), 500);

    function onScanErrorVentas(error) {
        // Silenciar errores de escaneo continuo
    }

    function buscarVentaPorCodigo(codigo) {
        if(!codigo) return;
        
        // Buscar el producto por código de barras
        const producto = items.find(i => i.codigoBarras === codigo);
        
        if(producto) {
            if(producto.cantidad > 0) {
                console.log('✅ Producto encontrado por código:', producto.nombre);
                prepararAddCarrito(producto.id);
                // Limpiar la casilla después de añadir con éxito
                document.getElementById('codigoBarrasVenta').value = '';
            } else {
                console.warn('❌ Producto agotado:', producto.nombre);
                alert('⚠️ El producto "' + producto.nombre + '" está AGOTADO.');
            }
        } else {
            // Si no se encuentra por código de barras, avisar y NO pasar a búsqueda por nombre automáticamente
            // para evitar confusiones en la casilla de búsqueda textual.
            console.warn('⚠️ Código de barras no registrado:', codigo);
            alert('El código "' + codigo + '" no coincide con ningún producto registrado.');
        }
    }

    function addItem() {
        const n = document.getElementById('nombre').value.trim();
        let c = parseFloat(document.getElementById('costo').value);
        const mon = document.getElementById('monedaCosto').value;
        const b = parseFloat(document.getElementById('beneficio').value);
        const q = parseFloat(document.getElementById('cantidad').value);
        const u = document.getElementById('unidad').value;
        const exento = document.getElementById('exentoIVA').checked;
        const editId = document.getElementById('editId').value;
        const stockMin = parseFloat(document.getElementById('stockMinimo').value);
        const sku = document.getElementById('codigoBarras').value.trim();

        if(!n || isNaN(c) || isNaN(q)) return alert('Datos incompletos');
        if(mon === 'BS') c = c / tasaDolar;
        const pV = c * (1 + b/100);
        
        if(editId) {
            const idx = items.findIndex(i => i.id == editId);
            if(idx !== -1) items[idx] = { ...items[idx], nombre: n, costo: c, beneficio: b, precioVenta: pV, cantidad: q, unidad: u, exento: exento, stockMin: stockMin, codigoBarras: sku };
        } else {
            const ex = items.find(i => i.nombre.toLowerCase() === n.toLowerCase());
            if(ex) { ex.cantidad += q; ex.costo = c; ex.beneficio = b; ex.precioVenta = pV; ex.unidad = u; ex.exento = exento; ex.stockMin = stockMin; ex.codigoBarras = sku; }
            else items.push({ id: Date.now(), nombre: n, costo: c, beneficio: b, precioVenta: pV, cantidad: q, unidad: u, exento: exento, stockMin: stockMin, codigoBarras: sku });
        }
        limpiarForm(); sync(); render();
    }

    function editarItem(id) {
        const i = items.find(x => x.id == id);
        if(!i) return;
        document.getElementById('formTitle').textContent = '✏️ Editar Producto';
        document.getElementById('editId').value = i.id;
        document.getElementById('nombre').value = i.nombre;
        document.getElementById('costo').value = (i.costo * tasaDolar).toFixed(2);
        document.getElementById('monedaCosto').value = 'BS';
        document.getElementById('beneficio').value = i.beneficio;
        document.getElementById('cantidad').value = i.cantidad;
        document.getElementById('unidad').value = i.unidad || 'UND';
        document.getElementById('exentoIVA').checked = i.exento || false;
        document.getElementById('codigoBarras').value = i.codigoBarras || '';
        document.getElementById('stockMinimo').value = i.stockMin !== undefined ? i.stockMin : stockMinimoGlobal;
        document.getElementById('btnGuardar').textContent = 'GUARDAR CAMBIOS';
        document.getElementById('btnCancelarEdit').style.display = 'block';
        calcularCostoDual();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // Función para filtrar proveedores mientras se escribe
    function filtrarProveedores() {
        const input = document.getElementById('proveedorFilterInput');
        const dropdown = document.getElementById('proveedorDropdown');
        const filter = input.value.toLowerCase();
        
        if(!filter) {
            dropdown.style.display = 'none';
            return;
        }
        
        const filtered = proveedores.filter(p => 
            p.nombre.toLowerCase().includes(filter) || 
            (p.rif && p.rif.toLowerCase().includes(filter))
        );
        
        if(filtered.length === 0) {
            dropdown.innerHTML = '<div style="padding:10px; text-align:center; color:#999;">No hay proveedores</div>';
        } else {
            dropdown.innerHTML = filtered.map(p => `
                <div class="provider-option" onclick="seleccionarProveedor(${p.id}, '${p.nombre.replace(/'/g, "\\'")}')">
                    <strong>${p.nombre}</strong><br>
                    <small>${p.rif || 'Sin RIF'}</small>
                </div>
            `).join('');
        }
        
        dropdown.style.display = 'block';
    }

        document.getElementById('proveedorFactura').value = proveedorId;
        document.getElementById('proveedorFilterInput').value = proveedorNombre;

    function render() {
        // --- ACTUALIZAR NOMBRE DEL NEGOCIO ---
        const nombreN = configMaestra.nombreNegocio || 'Control de Víveres - Pro Contable v2';
        const h2Header = document.querySelector('.header-info h2');
        if(h2Header) h2Header.textContent = '📦 ' + nombreN;
        document.title = nombreN;

        // --- BLOQUEOS POR VERSIÓN Y PERMISOS ---
        const version = configMaestra.version || 'BASICO';
        const p = configDueno;
        
        // Control de Visibilidad de Pestañas (Multi-Tenant)
        const tabs = {
            'tab-inventario': p.hideTabInventario,
            'tab-ventas': p.hideTabVentas,
            'tab-creditos': p.hideTabCreditos || (version === 'BASICO'),
            'tab-proveedores': p.hideTabProveedores || (version !== 'PREMIUM'),
            'tab-gastos': p.hideTabGastos || (version !== 'PREMIUM'),
            'tab-reportes': p.hideTabReportes || (version === 'BASICO')
        };

        for (const [id, hidden] of Object.entries(tabs)) {
            const el = document.getElementById(id);
            if(el) el.style.display = hidden ? 'none' : 'block';
        }

        // --- CORRECCIÓN: Si la pestaña activa está oculta, activar la primera visible ---
        const tabContentActivo = document.querySelector('.tab-content.active');
        const tabBtnActivo = document.querySelector('.tab-btn.active');
        const tabBtnActivoId = tabBtnActivo ? tabBtnActivo.id : null;
        const tabActivaOculta = tabBtnActivoId ? tabs[tabBtnActivoId] : true;

        if(!tabContentActivo || tabActivaOculta) {
            // Buscar la primera pestaña visible y activarla
            const ordenTabs = ['inventario', 'ventas', 'creditos', 'proveedores', 'gastos', 'reportes'];
            for (const tabId of ordenTabs) {
                const btnId = 'tab-' + tabId;
                const esOculta = tabs[btnId];
                if (!esOculta) {
                    // Desactivar todo
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    // Activar la primera visible
                    const contenido = document.getElementById(tabId);
                    const boton = document.getElementById(btnId);
                    if(contenido) contenido.classList.add('active');
                    if(boton) boton.classList.add('active');
                    break;
                }
            }
        }

        // Bloqueos de Acción (Solo Lectura)
        // Inventario
        const formInv = document.querySelector('#inventario h2#formTitle');
        const inputsInv = document.querySelectorAll('#inventario input, #inventario select, #inventario button.btn-add');
        if(!p.permisoInventario) {
            if(formInv) formInv.style.display = 'none';
            inputsInv.forEach(el => { 
                if(el.id !== 'filtroStock' && el.id !== 'tasa' && el.id !== 'stockMinimo') el.style.display = 'none'; 
            });
            // Ocultar botones de editar/eliminar en la lista (se maneja en el map de la lista)
        } else {
            if(formInv) formInv.style.display = 'block';
            inputsInv.forEach(el => el.style.display = '');
        }

        // Control de Escáner (Cámara)
        const camInv = document.getElementById('btn-camera-inventario');
        const camVentas = document.getElementById('btn-camera-ventas');
        const scanVentaInput = document.getElementById('codigoBarrasVenta');
        
        if(version === 'BASICO') {
            if(camInv) camInv.style.display = 'none';
            if(camVentas) camVentas.style.display = 'none';
            if(scanVentaInput) scanVentaInput.parentElement.style.display = 'none';
        } else {
            if(camInv) camInv.style.display = 'block';
            if(camVentas) camVentas.style.display = 'block';
            if(scanVentaInput) scanVentaInput.parentElement.style.display = 'block';
        }

        // Actualizar la fecha actual en cada renderizado
        const diaHoyActual = new Date().toLocaleDateString('es-ES');
        if(diaHoyActual !== diaActual) {
            console.log('📅 Cambio de día detectado en render:', diaActual, '->', diaHoyActual);
            diaActual = diaHoyActual;
        }
        actualizarDiaActual();
        const lista = document.getElementById('lista');
        const filtro = document.getElementById('filtroStock').value.toLowerCase();
        let totalInv = 0;
        lista.innerHTML = items.filter(i => i.nombre.toLowerCase().includes(filtro)).map(i => {
            const pVBs = i.precioVenta * tasaDolar;
            totalInv += (i.precioVenta * i.cantidad * tasaDolar);
            const verCostos = sesionDuenoActiva || configDueno.permisoVerCostos;
            const unit = i.unidad || 'UND';
            const displayQty = unit === 'KG' ? i.cantidad.toFixed(3) + ' Kg' : i.cantidad;
            const sMin = i.stockMin !== undefined ? i.stockMin : stockMinimoGlobal;
            return `<div class="item ${i.cantidad <= sMin ? 'alert' : ''}">
                <div class="item-header">
                    <span class="item-name">${i.nombre} <span class="unit-badge">${unit}</span> ${i.exento ? '<span class="exento-badge">EXENTO</span>' : ''} ${i.codigoBarras ? '<span class="barcode-badge">' + i.codigoBarras + '</span>' : ''}</span>
                    <span class="item-quantity">${displayQty}</span>
                </div>
                <div style="font-size:0.9rem; font-weight:bold;">Bs. ${fM(pVBs)} <small>/${unit}</small></div>
                <div class="price-dual">$ ${fM(i.precioVenta)} /${unit}</div>
                <div class="item-actions" style="${p.permisoInventario ? '' : 'display:none;'}"><button class="btn-edit" onclick="editarItem(${i.id})">✏️</button><button class="btn-delete" onclick="eliminarItem(${i.id})">🗑️</button></div>
            </div>`;
        }).join('');
        document.getElementById('totalDisplay').textContent = 'Bs. ' + fM(totalInv);
        document.getElementById('totalDisplayUSD').textContent = '$ ' + fM(totalInv / tasaDolar);
        
        const fallas = items.filter(i => i.cantidad <= (i.stockMin !== undefined ? i.stockMin : stockMinimoGlobal));
        document.getElementById('reporteFallas').innerHTML = fallas.length ? fallas.map(f => `<div>• ${f.nombre}: <b>${f.unidad === 'KG' ? f.cantidad.toFixed(3) : f.cantidad}</b> <span class="falla-badge ${f.cantidad==0?'agotado':'bajo'}">${f.cantidad==0?'AGOTADO':'BAJO'}</span></div>`).join('') : 'No hay fallas';

        renderCarrito();
        renderProveedores();
        
        // Actualizar totales diarios considerando gastos
        const diaHoy = new Date().toLocaleDateString('es-ES');
        const vHoy = ventas.filter(v => v.dia === diaHoy);
        const vPendientes = ventas.filter(v => v.dia !== diaHoy);
        
        let ing = 0, gan = 0, ivaRec = 0;
        vHoy.forEach(v => { 
            if(!v.anulada) { 
                ing += v.total; 
                gan += v.ganancia; 
                ivaRec += (v.ivaMonto || 0);
            } 
        });
        document.getElementById('ingresosTotales').textContent = 'Bs. ' + fM(ing);
        document.getElementById('ivaRecaudado').textContent = 'Bs. ' + fM(ivaRec);
        const costosDelDia = gastosOperativos.filter(c => c.fecha === diaHoy).reduce((sum, c) => sum + c.monto, 0);
        const gananciaNeta = gan - costosDelDia;
        document.getElementById('gananciaEstimada').textContent = 'Bs. ' + fM(gananciaNeta);
        
        const ventasHistorialElement = document.getElementById('ventasHistorial');
        if(ventasHistorialElement) {
            const htmlVHoy = vHoy.length > 0 ? vHoy.slice().reverse().map(v => `
                <div class="item ${v.anulada ? 'anulada' : ''}">
                    <b>${v.producto}</b><br>Total: Bs. ${fM(v.total)} (${v.hora})
                    <small style="color:var(--primary); font-weight:bold;">Ganancia: Bs. ${fM(v.ganancia)}</small>
                    ${!v.anulada ? (p.permisoAnularVentas ? `<br><button class="btn-anular" onclick="anularVenta(${v.id})">ANULAR VENTA</button>` : "") : "<b>[ANULADA]</b>"}
                </div>`).join('') : '<p style="text-align:center; color:#999;">Sin ventas hoy</p>';

            const htmlVPendientes = vPendientes.length > 0 ? `
                <div style="background:#fff3cd; padding:10px; border-radius:10px; margin-bottom:15px; border:1px solid #ffeeba;">
                    <h3 style="margin:0 0 10px 0; font-size:0.9rem; color:#856404;">⚠️ VENTAS PENDIENTES DE CIERRE</h3>
                    ${vPendientes.slice().reverse().map(v => `
                        <div class="item ${v.anulada ? 'anulada' : ''}" style="background:white; margin-bottom:5px; border-left-color:#ffc107;">
                            <small>${v.dia}</small> <b>${v.producto}</b><br>Total: Bs. ${fM(v.total)}
                            ${!v.anulada ? `<br><button class="btn-anular" onclick="anularVenta(${v.id})">ANULAR VENTA</button>` : ''}
                        </div>`).join('')}
                    <button class="btn-vender" onclick="cerrarDia()" style="width:100%; margin-top:5px; background:#ffc107; color:#000;">CERRAR DÍAS PENDIENTES</button>
                </div>` : '';

            ventasHistorialElement.innerHTML = htmlVPendientes + htmlVHoy;
        } else {

                        ${cli && cli.telefono ? '<br><small>📞 '+cli.telefono+'</small>' : ''}
                    </div>
                    <div style="text-align:right;">

                        ${g.cedula ? `<br><button onclick="eliminarCliente('${g.cedula}')" style="background:none; color:var(--danger); border:none; padding:0; font-size:0.65rem; cursor:pointer;">Eliminar Cliente</button>` : ''}

                    ${g.items.map(it => `<div style="font-size:0.75rem; border-bottom:1px solid #eee; padding:5px 0; display:flex; justify-content:space-between; align-items:center;">
                        <span>${it.fecha}: ${it.detalle} (Bs. ${fM(it.monto)})</span>

        document.getElementById('listaCreditos').innerHTML = htmlCreditos || '<p style="text-align:center; color:#999; padding:20px;">Sin deudas pendientes</p>';
        // Renderizar gastos operativos del día
        const gastosHoy = gastosOperativos.filter(c => c.fecha === diaActual);

                    <button onclick="eliminarGastoOperativo(${c.id})" style="background:var(--danger); color:white; border:none; padding:5px 10px; border-radius:5px; cursor:pointer; font-size:0.7rem; white-space:nowrap;">ELIMINAR</button>
                </div>
            `).join('') : '<p style="text-align:center; color:#999; padding:10px;">Sin gastos registrados</p>';
        }
        
        document.getElementById('historialCierres').innerHTML = cierres.slice().reverse().map(c => `
            <div class="item cierre-item">
                <b>${c.tipo}: ${c.fecha}</b><br>
                Ventas: Bs. ${fM(c.ingresos)}<br>
                IVA: Bs. ${fM(c.iva || 0)}<br>
                Ganancia Bruta: Bs. ${fM(c.ganancia)}

                ${c.gananciaNeta ? `<br><span style="color:var(--primary); font-weight:bold;">Ganancia Neta: Bs. ${fM(c.gananciaNeta)}</span>` : ''}
            </div>
        `).join('') || 'No hay cierres';
    }

    function buscarVenta() {
        const q = document.getElementById('busquedaProducto').value.toLowerCase();
        const res = document.getElementById('searchResults');
        if(!q) return res.innerHTML = '';
        
        const resultados = items.filter(i => i.nombre.toLowerCase().includes(q) && i.cantidad > 0);
        console.log('🔍 Búsqueda de texto:', q, '- Resultados:', resultados.length);
        
        res.innerHTML = resultados.map(i => `
            <div class="search-result-item" onclick="prepararAddCarrito(${i.id})"><div><b>${i.nombre}</b> ${i.exento ? '<span class="exento-badge">EXENTO</span>' : ''}<br><small>Bs. ${fM(i.precioVenta * tasaDolar)} /${i.unidad || 'UND'}</small></div><button class="btn-add-search">AÑADIR</button></div>
        `).join('');

    function prepararAddCarrito(id) {
        const i = items.find(x => x.id === id);
        if(!i) {
            alert('Producto no encontrado');
            return;
        }
        
        console.log('🛒 Preparando para añadir al carrito:', i.nombre);
        
        if(i.unidad === 'KG') {
            itemPendientePeso = i;
            document.getElementById('pesoProductoNombre').textContent = i.nombre + " (Bs. " + fM(i.precioVenta * tasaDolar) + "/Kg)";
            document.getElementById('pesoInput').value = '';
            document.getElementById('pesoPreview').textContent = 'Total: Bs. 0,00';
            document.getElementById('modalPeso').classList.add('active');
            document.getElementById('pesoInput').oninput = () => {
                const p = parseFloat(document.getElementById('pesoInput').value) || 0;
                document.getElementById('pesoPreview').textContent = 'Total: Bs. ' + fM(p * i.precioVenta * tasaDolar);
            };
        } else {
            addCarrito(id, 1);
        }
    }

    function confirmarPeso() {
        const p = parseFloat(document.getElementById('pesoInput').value);
        if(isNaN(p) || p <= 0) return alert('Peso inválido');
        if(p > itemPendientePeso.cantidad) return alert('Stock insuficiente');
        addCarrito(itemPendientePeso.id, p);
        cerrarModalPeso();
    }

    function cerrarModalPeso() { document.getElementById('modalPeso').classList.remove('active'); itemPendientePeso = null; }

    function addCarrito(id, cant) {
        const i = items.find(x => x.id === id);
        if(!i) {
            alert('Producto no encontrado');
            return;
        }
        
        const ex = carrito.find(x => x.id === id && x.unidad !== 'KG');
        if(ex && i.unidad !== 'KG') { 
            if(ex.q + cant <= i.cantidad) {
                ex.q += cant;
                console.log('✏️ Cantidad actualizada:', i.nombre, '- Nueva cantidad:', ex.q);
            } else {
                alert('Sin stock suficiente');
            }
        } else {
            carrito.push({ ...i, q: cant });
            console.log('✅ Producto añadido al carrito:', i.nombre, '- Cantidad:', cant);
        }
        renderCarrito();
    }

    function updateQty(idx, delta) {
        const item = carrito[idx];
        const stock = items.find(x => x.id === item.id).cantidad;
        if(item.unidad === 'KG') {
            if(item.q + (delta * 0.1) > 0 && item.q + (delta * 0.1) <= stock) { item.q += (delta * 0.1); renderCarrito(); }
            else if(item.q + (delta * 0.1) <= 0) { carrito.splice(idx, 1); renderCarrito(); }
        } else {
            if(item.q + delta > 0 && item.q + delta <= stock) { item.q += delta; renderCarrito(); }
            else if(item.q + delta <= 0) { carrito.splice(idx, 1); renderCarrito(); }
        }
    }

    function renderCarrito() {
        const c = document.getElementById('carritoContainer');
        document.getElementById('ivaLabel').textContent = ivaPorcentaje;
        if(!carrito.length) { 
            document.getElementById('totalCarrito').textContent = 'Bs. 0,00'; 
            document.getElementById('subtotalGravable').textContent = 'Bs. 0,00';
            document.getElementById('subtotalExento').textContent = 'Bs. 0,00';
            document.getElementById('ivaCarrito').textContent = 'Bs. 0,00';
            return c.innerHTML = '<div style="text-align:center; color:#999; padding:20px;">Carrito vacío</div>'; 
        }
        let subGrav = 0, subExento = 0;
        c.innerHTML = carrito.map((i, idx) => {
            const subItem = i.precioVenta * i.q * tasaDolar;
            if(i.exento) subExento += subItem; else subGrav += subItem;
            const displayQty = i.unidad === 'KG' ? i.q.toFixed(3) + ' Kg' : i.q + ' Und';
            return `<div class="item">
                <b>${i.nombre}</b> ${i.exento ? '<span class="exento-badge">EXENTO</span>' : ''} - Bs. ${fM(subItem)} <small>(${displayQty})</small>
                <button onclick="carrito.splice(${idx},1); renderCarrito();" style="background:none; color:var(--danger); float:right;">✖</button>
                <div class="qty-controls">
                    <button class="btn-qty" onclick="updateQty(${idx},-1)">-</button>
                    <span style="font-weight:bold; min-width:30px; text-align:center;">${i.unidad === 'KG' ? 'Kg' : i.q}</span>
                    <button class="btn-qty" onclick="updateQty(${idx},1)">+</button>
                </div>
            </div>`;
        }).join('');
        
        const conIVA = document.getElementById('aplicarIVA').checked;
        const ivaMonto = conIVA ? (subGrav * (ivaPorcentaje / 100)) : 0;
        const total = subGrav + subExento + ivaMonto;
        
        document.getElementById('subtotalGravable').textContent = 'Bs. ' + fM(subGrav);
        document.getElementById('subtotalExento').textContent = 'Bs. ' + fM(subExento);
        document.getElementById('ivaCarrito').textContent = 'Bs. ' + fM(ivaMonto);
        document.getElementById('totalCarrito').textContent = 'Bs. ' + fM(total);
        document.getElementById('totalCarritoUSD').textContent = '$ ' + fM(total / tasaDolar);
    }

    function finalizarVenta(esCredito) {
        if(!carrito.length) return alert('Carrito vacío');
        
        let clienteNombre = "", clienteCedula = "", clienteTelefono = "";
        if(esCredito) {
            clienteNombre = document.getElementById('nombreCliente').value.trim();
            clienteCedula = document.getElementById('cedulaCliente').value.trim();
            clienteTelefono = document.getElementById('telefonoCliente').value.trim();
            if(!clienteNombre || !clienteCedula) return alert('Nombre y Cédula son obligatorios');
            
            const idx = clientes.findIndex(c => c.cedula === clienteCedula);
            if(idx === -1) clientes.push({ id: Date.now(), nombre: clienteNombre, cedula: clienteCedula, telefono: clienteTelefono });
            else { clientes[idx].nombre = clienteNombre; clientes[idx].telefono = clienteTelefono; }
        }

        let subGravV = 0, subExentoV = 0, ganV = 0, det = "";
        const conIVA = document.getElementById('aplicarIVA').checked;
        
        carrito.forEach(c => {
            const subItem = c.precioVenta * c.q * tasaDolar;
            if(c.exento) subExentoV += subItem; else subGravV += subItem;
            ganV += (c.precioVenta - c.costo) * c.q * tasaDolar;
            det += `${c.unidad === 'KG' ? parseFloat(c.q).toFixed(3)+'Kg' : c.q} ${c.nombre}, `;
        });
        
        const ivaMonto = conIVA ? (subGravV * (ivaPorcentaje / 100)) : 0;
        const totalV = subGravV + subExentoV + ivaMonto;

        if(totalV <= 0) return alert('El monto de la venta debe ser mayor a 0');

        // Descontar stock solo al confirmar éxito
        carrito.forEach(c => {
            const item = items.find(x => x.id === c.id);
            if(item) item.cantidad -= c.q;
        });
        
        // Asegurar que diaActual está actualizado ANTES de guardar
        const diaParaGuardar = new Date().toLocaleDateString('es-ES');
        console.log('💾 Guardando venta con fecha:', diaParaGuardar);
        
        ventas.push({ 
            id: Date.now(), 
            producto: det.slice(0,-2), 
            subtotalGravable: subGravV,
            subtotalExento: subExentoV,
            ivaMonto: ivaMonto,
            total: totalV, 
            ganancia: ganV, 
            dia: diaParaGuardar, 
            hora: new Date().toLocaleTimeString(), 
            tipo: esCredito?'credito':'contado', 
            anulada: false 
        });
        
        if(esCredito) {
            creditos.push({ 
                id: Date.now(),
                cliente: clienteNombre, 
                cedula: clienteCedula,
                monto: totalV, 
                detalle: det.slice(0,-2), 
                fecha: diaParaGuardar,
                pagado: false
            });
        }
        
        carrito = []; 
        document.getElementById('nombreCliente').value = '';
        document.getElementById('cedulaCliente').value = '';
        document.getElementById('telefonoCliente').value = '';
        document.getElementById('busquedaProducto').value = '';
        document.getElementById('searchResults').innerHTML = '';
        cerrarModalCredito(); 
        
        sync(); 
        render(); 
        alert('Venta guardada con éxito');
    }

    function anularVenta(id) {
        if(confirm('¿Anular esta venta? El stock se devolverá.')) {
            const v = ventas.find(x => x.id === id);
            if(v) {
                v.anulada = true;
                const partes = v.producto.split(', ');
                partes.forEach(p => {
                    const match = p.match(/([\d.]+)(Kg| )?(.*)/);
                    if(match) {
                        const cant = parseFloat(match[1]);
                        const nom = match[3].trim();
                        const item = items.find(i => i.nombre === nom);
                        if(item) item.cantidad += cant;
                    }
                });
                sync(); render();
            }
        }
    }

        const conceptoInput = document.getElementById('conceptoGasto');

    function cerrarDia() {
        const diaHoyParaCierre = new Date().toLocaleDateString('es-ES');
        
        // Primero, detectar si hay ventas de días anteriores sin cerrar
        const ventasAnteriores = ventas.filter(v => v.dia !== diaHoyParaCierre && !v.anulada);
        if(ventasAnteriores.length > 0) {
            const diasPendientes = [...new Set(ventasAnteriores.map(v => v.dia))];
            const mensaje = `⚠️ AVISO: Hay ventas pendientes de cierre de ${diasPendientes.length} día(s):\n${diasPendientes.join(', ')}\n\n¿Deseas cerrar esos días primero?`;
            if(confirm(mensaje)) {
                cerrarDiasAnteriores(diasPendientes);
                return; // Salir para que el usuario cierre primero los días anteriores
            }
        }
        
        const vHoy = ventas.filter(v => v.dia === diaHoyParaCierre && !v.anulada);
        if(!vHoy.length) return alert('No hay ventas para cerrar hoy');
        
        console.log('🔐 Cerrando caja para el día:', diaHoyParaCierre, '- Ventas:', vHoy.length);
        if(confirm('¿Cerrar caja? Se guardarán los totales de ventas, IVA, ganancias y costos operativos.')) {
            let ing = 0, gan = 0, iva = 0, costos = 0;
            vHoy.forEach(v => { ing += v.total; gan += v.ganancia; iva += (v.ivaMonto || 0); });
            
            // Sumar costos operativos del día
            const costosHoy = gastosOperativos.filter(c => c.fecha === diaHoyParaCierre);
            costosHoy.forEach(c => { costos += c.monto; });
            
            const gananciaNeta = gan - costos;
            cierres.push({ 
                fecha: diaHoyParaCierre, 
                ingresos: ing, 
                iva: iva, 
                ganancia: gan,
                gastosOperativos: costos,
                gananciaNeta: gananciaNeta,
                tipo: 'DIARIO' 
            });
            
            ventas = ventas.filter(v => v.dia !== diaHoyParaCierre);
            gastosOperativos = gastosOperativos.filter(c => c.fecha !== diaHoyParaCierre);
            sync(); 
            render(); 
            alert(`Caja cerrada.\nGanancia Bruta: Bs. ${fM(gan)}\nCostos: Bs. ${fM(costos)}\nGanancia Neta: Bs. ${fM(gananciaNeta)}`);
        }
    }

    function cerrarMes() {
        if(confirm('¿Realizar cierre mensual? Se agruparán los cierres diarios.')) {
            let ing = 0, gan = 0, iva = 0, costos = 0, gananciaNeta = 0;
            const cierresDiarios = cierres.filter(c => c.tipo === 'DIARIO');
            cierresDiarios.forEach(c => { 
                ing += c.ingresos; 
                gan += c.ganancia; 
                iva += (c.iva || 0);
                costos += (c.gastosOperativos || 0);
                gananciaNeta += (c.gananciaNeta || c.ganancia);
            });
            const mesAnio = diaActual.split('/')[1] + '/' + diaActual.split('/')[2];
            cierres = cierres.filter(c => c.tipo !== 'DIARIO');
            cierres.push({ 
                fecha: 'MES ' + mesAnio, 
                ingresos: ing, 
                iva: iva, 
                ganancia: gan,
                gastosOperativos: costos,
                gananciaNeta: gananciaNeta,
                tipo: 'MENSUAL' 
            });
            sync(); 
            render(); 
            alert(`Cierre Mensual Completado\nIngresos: Bs. ${fM(ing)}\nGanancia Bruta: Bs. ${fM(gan)}\nGastos Operativos: Bs. ${fM(costos)}\nGanancia Neta: Bs. ${fM(gananciaNeta)}`);
        }
    }

        const f_costo = document.getElementById('costoUnitarioFactura');
