<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Inverteca Core - Bloque 1 (Configuración Maestra)</title>
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-database.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-auth.js"></script>
    <style>
        body { font-family: sans-serif; background: #f4f7f6; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { background: white; padding: 30px; border-radius: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); text-align: center; width: 90%; max-width: 400px; }
        .status-dot { width: 15px; height: 15px; border-radius: 50%; display: inline-block; background: #e74c3c; margin-right: 8px; }
        .online { background: #2ecc71; box-shadow: 0 0 10px #2ecc71; }
        .info { margin-top: 20px; font-size: 0.9rem; color: #666; }
        #debug-log { margin-top: 20px; font-family: monospace; font-size: 0.8rem; background: #000; color: #0f0; padding: 10px; border-radius: 5px; width: 100%; text-align: left; height: 150px; overflow-y: auto; }
    </style>
</head>
<body>

    <div class="card">
        <h1 id="business-name">Conectando...</h1>
        <div>
            <span id="dot" class="status-dot"></span>
            <span id="status-text">Desconectado</span>
        </div>
        <div class="info">
            ID Detectado: <strong id="detected-id">Ninguno</strong>
        </div>
        <div id="debug-log"></div>
    </div>

    <script>
        function log(msg) {
            const el = document.getElementById('debug-log');
            el.innerHTML += `<div>> ${msg}</div>`;
            el.scrollTop = el.scrollHeight;
            console.log(msg);
        }

        // CONFIGURACIÓN EXTRAÍDA DEL PANEL DE SUPERUSUARIO (LA QUE FUNCIONA)
        const firebaseConfig = {
            apiKey: "AIzaSyD5sWhgWQ5RfIIzn_vAlZi9Z",
            authDomain: "inverteca-core.firebaseapp.com",
            databaseURL: "https://inverteca-core-default-rtdb.firebaseio.com",
            projectId: "inverteca-core",
            storageBucket: "inverteca-core.firebaseapp.com",
            messagingSenderId: "647568711575",
            appId: "1:647568711575:web:d09efc86829"
        };

        // 1. Detección de ID
        const urlParams = new URLSearchParams(window.location.search);
        let clienteId = urlParams.get('id');

        // INYECCIÓN TEMPORAL PARA PRUEBAS
        if (!clienteId) {
            clienteId = "c001angeles"; 
            log("⚠️ Usando ID temporal: " + clienteId);
        }

        document.getElementById('detected-id').textContent = clienteId;

        // 2. Inicializar Firebase
        try {
            firebase.initializeApp(firebaseConfig);
            log("🔥 Firebase Inicializado con Llave Maestra.");
            
            // Usamos conexión directa para el primer bloque
            conectarADatos(clienteId);

        } catch (err) {
            log("❌ Error Init: " + err.message);
        }

        function conectarADatos(id) {
            const db = firebase.database();
            const path = `clientes/${id}/config`;
            
            log("📡 Conectando a: " + path);
            
            // Intento de lectura inmediata (sin Auth para probar reglas)
            db.ref(path).on('value', snap => {
                const config = snap.val();
                if (config) {
                    log("✅ ¡DATOS RECIBIDOS!");
                    document.getElementById('business-name').textContent = config.nombre_negocio || "Sin Nombre";
                    document.getElementById('dot').className = "status-dot online";
                    document.getElementById('status-text').textContent = "CONECTADO";
                    alert("¡ESTOY CONECTADO! - " + (config.nombre_negocio || id));
                } else {
                    log("❓ No hay datos en: " + path);
                    document.getElementById('business-name').textContent = "ID no configurado";
                }
            }, err => {
                log("❌ Error DB: " + err.message);
                log("💡 TIP: Si sale 'Permission Denied', necesitamos Auth.");
                
                // Si falla por permisos, intentamos Auth Anónimo
                log("🔐 Intentando Autenticación Anónima...");
                firebase.auth().signInAnonymously().then(() => {
                    log("✅ Autenticación OK.");
                }).catch(e => log("❌ Error Auth: " + e.message));
            });
        }
    </script>
</body>
</html>
