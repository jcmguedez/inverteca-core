        if(!f_prod.value) { alert('Ingresa el nombre del producto'); f_prod.focus(); return; }
        if(!f_costo.value || isNaN(parseFloat(f_costo.value))) { alert('Ingresa el costo'); f_costo.focus(); return; }
        if(!f_cant.value || parseFloat(f_cant.value) <= 0) { alert('Ingresa una cantidad válida'); f_cant.focus(); return; }

        const proveedorId = f_prov.value;
        const nroFactura = f_nro.value;
        const sku = document.getElementById('skuFactura').value;
        const producto = f_prod.value;
        let costoUnitario = parseFloat(f_costo.value);
        const moneda = document.getElementById('monedaCostoFactura').value;
        const cantidad = parseFloat(f_cant.value);
        const aplicarIva = document.getElementById('ivaFactura').checked;
        const beneficio = parseFloat(document.getElementById('beneficioFactura').value) || 30;
        const stockMinimo = parseFloat(document.getElementById('stockMinimoFactura').value) || stockMinimoGlobal;

        // Convertir a dólares para el almacenamiento interno (si está en Bs)
        const costoUSD = moneda === 'BS' ? costoUnitario / tasaDolar : costoUnitario;
        const costoBS = moneda === 'BS' ? costoUnitario : costoUnitario * tasaDolar;
        
        // Obtener unidad del producto si existe en inventario
        const productoExistente = items.find(i => (sku && i.codigoBarras === sku) || i.nombre.toLowerCase() === producto.toLowerCase());
        const unidad = productoExistente ? (productoExistente.unidad || 'UND') : 'UND';

        const subtotal = costoBS * cantidad;
        const ivaAmount = aplicarIva ? subtotal * (ivaPorcentaje / 100) : 0;
        const total = subtotal + ivaAmount;
        
        carritoFacturaTemp.push({
            id: Date.now(),
            sku: sku,
            producto: producto,
            costoUnitario: costoBS,
            costoUSD: costoUSD,
            cantidad: cantidad,
            unidad: unidad,
            subtotal: subtotal,
            iva: ivaAmount,
            total: total,
            aplicaIva: aplicarIva,
            beneficio: beneficio,
            stockMinimo: stockMinimo
        });
        
        document.getElementById('skuFactura').value = '';
        document.getElementById('productoFactura').value = '';
        document.getElementById('costoUnitarioFactura').value = '';
        document.getElementById('cantidadFactura').value = '0';
        document.getElementById('ivaFactura').checked = true;
        document.getElementById('totalFacturaPreview').textContent = 'Bs. 0,00';
        document.getElementById('skuFactura').focus();
        
        renderCarritoFactura();
    }
    
    function renderCarritoFactura() {
        const carritoDiv = document.getElementById('carritoFactura');
        let totalGeneral = 0;
        
        carritoDiv.innerHTML = carritoFacturaTemp.map((p, idx) => {
            totalGeneral += p.total;
            return `<div class="item" style="display: flex; justify-content: space-between; align-items: center;">
                <div style="flex: 1;">
                    <b>${p.producto}</b> ${p.sku ? '<small style="color: #666;">[SKU: ' + p.sku + ']</small>' : ''}<br>
                    <small>Costo: Bs. ${fM(p.costoUnitario)} x ${p.cantidad} ${p.unidad || 'UND'} = Bs. ${fM(p.subtotal)}</small>
                    ${p.aplicaIva ? '<br><small style="color: var(--warning);">IVA: Bs. ' + fM(p.iva) + '</small>' : ''}
                </div>
                <div style="text-align: right; margin-left: 10px;">
                    <b>Bs. ${fM(p.total)}</b><br>
                    <button class="btn-delete" onclick="eliminarDelCarritoFactura(${idx})" style="padding: 3px 8px; font-size: 0.7rem;">QUITAR</button>
                </div>
            </div>`;
        }).join('');
        
        document.getElementById('totalFacturaCompleta').textContent = 'Bs. ' + fM(totalGeneral);
    }
    
    function eliminarDelCarritoFactura(idx) {
        carritoFacturaTemp.splice(idx, 1);
        renderCarritoFactura();
    }
    
    function finalizarFactura() {
        const proveedorId = document.getElementById('proveedorFactura').value;
        const nroFactura = document.getElementById('nroFactura').value;
        const fechaFactura = document.getElementById('fechaFactura').value;
        const fechaVencimiento = document.getElementById('fechaVencimiento').value;
        
        if(!proveedorId || !nroFactura || carritoFacturaTemp.length === 0) {
            return alert('Completa los datos y añade al menos un producto');
        }
        
        const totalFactura = carritoFacturaTemp.reduce((sum, p) => sum + p.total, 0);
        const ivaTotal = carritoFacturaTemp.reduce((sum, p) => sum + p.iva, 0);
        
        facturas.push({
            id: Date.now(),
            proveedorId: parseInt(proveedorId),
            nroFactura: nroFactura,
            fechaFactura: fechaFactura,
            fechaVencimiento: fechaVencimiento,
            productos: carritoFacturaTemp,
            totalFactura: totalFactura,
            ivaTotal: ivaTotal,
            pagado: false,
            fechaRegistro: new Date().toLocaleDateString()
        });

        // Actualizar Inventario con los nuevos productos/costos
        carritoFacturaTemp.forEach(p => {
            const idx = items.findIndex(i => (p.sku && i.codigoBarras === p.sku) || i.nombre.toLowerCase() === p.producto.toLowerCase());
            if(idx !== -1) {
                // Producto existe: actualizar stock y costo (en USD)
                items[idx].cantidad += p.cantidad;
                items[idx].costo = p.costoUSD;
                items[idx].beneficio = p.beneficio || 30;
                items[idx].stockMin = p.stockMinimo || stockMinimoGlobal;
                // Recalcular precio de venta basado en el nuevo costo y el beneficio
                items[idx].precioVenta = items[idx].costo * (1 + items[idx].beneficio/100);
            } else {
                // Producto nuevo: añadir al inventario
                items.push({
                    id: Date.now() + Math.random(),
                    nombre: p.producto,
                    costo: p.costoUSD,
                    beneficio: p.beneficio || 30,
                    precioVenta: p.costoUSD * (1 + (p.beneficio || 30)/100),
                    cantidad: p.cantidad,
                    unidad: p.unidad || 'UND',
                    exento: !p.aplicaIva,
                    stockMin: p.stockMinimo || stockMinimoGlobal,
                    codigoBarras: p.sku
                });
            }
        });
        
        carritoFacturaTemp = [];
        limpiarFormFactura();
        document.getElementById('carritoFactura').innerHTML = '';
        document.getElementById('totalFacturaCompleta').textContent = 'Bs. 0,00';
        sync();
        render();
        alert('Factura registrada correctamente');
    }
    
    function cancelarFactura() {
        if(carritoFacturaTemp.length > 0 && !confirm('Estás a punto de cancelar una factura con ' + carritoFacturaTemp.length + ' productos. ¿Continuar?')) {
            return;
        }
        carritoFacturaTemp = [];
        limpiarFormFactura();
        document.getElementById('carritoFactura').innerHTML = '';
        document.getElementById('totalFacturaCompleta').textContent = 'Bs. 0,00';
    }

    function limpiarFormFactura() {
        document.getElementById('proveedorFactura').value = '';
        document.getElementById('proveedorFilterInput').value = '';
        document.getElementById('nroFactura').value = '';
        document.getElementById('fechaFactura').value = '';
        document.getElementById('fechaVencimiento').value = '';
        document.getElementById('skuFactura').value = '';
        document.getElementById('productoFactura').value = '';
        document.getElementById('costoUnitarioFactura').value = '';
        document.getElementById('monedaCostoFactura').value = 'BS';
        document.getElementById('cantidadFactura').value = '0';
        document.getElementById('beneficioFactura').value = '30';
        document.getElementById('stockMinimoFactura').value = stockMinimoGlobal;
        document.getElementById('ivaFactura').checked = true;
        document.getElementById('totalFacturaPreview').textContent = 'Bs. 0,00';
        document.getElementById('searchResultsFactura').innerHTML = '';
        document.getElementById('productoSugerencia').style.display = 'none';
        document.getElementById('proveedorDropdown').style.display = 'none';
        const infoDiv = document.getElementById('infoProveedorSeleccionado');
        if(infoDiv) { infoDiv.innerHTML = ''; infoDiv.style.display = 'none'; }
    }

    function cargarProveedorFactura() {
        const proveedorId = document.getElementById('proveedorFactura').value;
        const infoDiv = document.getElementById('infoProveedorSeleccionado');
        
        if(!proveedorId) {
            if(infoDiv) infoDiv.style.display = 'none';
            return;
        }
        
        const proveedor = proveedores.find(p => p.id == proveedorId);
        if(proveedor) {
            if(infoDiv) {
                infoDiv.innerHTML = `
                    <div style="background:#e8f8f0; border:2px solid #27ae60; border-radius:8px; padding:12px; margin-top:8px; font-size:0.85rem;">
                        <strong style="color:#27ae60; font-size:0.95rem;">✓ Proveedor seleccionado:</strong><br>
                        <span style="font-size:0.9rem; font-weight:bold;">${proveedor.nombre}</span>
                        ${proveedor.rif ? `<br><span style="color:#555;">RIF: ${proveedor.rif}</span>` : ''}
                        ${proveedor.vendedor ? `<br><span style="color:#555;">Vendedor: ${proveedor.vendedor}</span>` : ''}
                        ${proveedor.telefono ? `<br><span style="color:#555;">Tel: ${proveedor.telefono}</span>` : ''}
                    </div>
                `;
                infoDiv.style.display = 'block';
            }
            document.getElementById('skuFactura').focus();
        }
    }

    function calcularTotalFactura() {
        let costoUnitario = parseFloat(document.getElementById('costoUnitarioFactura').value) || 0;
        const moneda = document.getElementById('monedaCostoFactura').value;
        const cantidad = parseFloat(document.getElementById('cantidadFactura').value) || 1;
        const aplicarIva = document.getElementById('ivaFactura').checked;
        
        // Convertir a Bs para la previsualización del total
        const costoBS = moneda === 'BS' ? costoUnitario : costoUnitario * tasaDolar;
        
        const subtotal = costoBS * cantidad;
        const iva = aplicarIva ? subtotal * (ivaPorcentaje / 100) : 0;
        const total = subtotal + iva;
        document.getElementById('totalFacturaPreview').textContent = 'Bs. ' + fM(total);
    }

    function marcarFacturaPagada(facturaId) {
        const idx = facturas.findIndex(f => f.id == facturaId);
        if(idx >= 0) {
            facturas[idx].pagado = true;
            sync();
            render();
        }
    }

    function eliminarFactura(facturaId) {
        if(confirm('¿Eliminar esta factura?')) {
            facturas = facturas.filter(f => f.id != facturaId);
            sync();
            render();
        }
    }

    function editarProveedor(id) {
        const p = proveedores.find(x => x.id == id);
        if(!p) return;
        document.getElementById('editProveedorId').value = p.id;
        document.getElementById('nombreProveedor').value = p.nombre || '';
        document.getElementById('rifProveedor').value = p.rif || '';
        document.getElementById('telefonoProveedor').value = p.telefono || '';
        document.getElementById('correoProveedor').value = p.correo || '';
        document.getElementById('vendedorProveedor').value = p.vendedor || '';
        document.getElementById('direccionProveedor').value = p.direccion || '';
        document.getElementById('nombreProveedor').focus();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    function eliminarProveedor(id) {
        if(!confirm('¿Eliminar este proveedor?')) return;
        proveedores = proveedores.filter(p => p.id != id);
        sync();
        render();
    }

    function renderProveedores() {
        actualizarSugerenciasProductos();

        // Render lista visual de proveedores registrados
        const listaDiv = document.getElementById('listaProveedoresRegistrados');
        if(listaDiv) {
            if(!proveedores || proveedores.length === 0) {
                listaDiv.innerHTML = '<p style="text-align:center; color:#999; padding:15px;">No hay proveedores registrados</p>';
            } else {
                listaDiv.innerHTML = proveedores.map(p => `
                    <div class="item">
                        <div class="item-header">
                            <span class="item-name">${p.nombre}</span>
                            <span class="item-quantity" style="background: var(--info);">${p.rif || 'Sin RIF'}</span>
                        </div>
                        ${p.telefono ? `<div class="detail-row"><strong>Tel:</strong> ${p.telefono}</div>` : ''}
                        ${p.vendedor ? `<div class="detail-row"><strong>Vendedor:</strong> ${p.vendedor}</div>` : ''}
                        ${p.correo ? `<div class="detail-row"><strong>Correo:</strong> ${p.correo}</div>` : ''}
                        <div class="item-actions">
                            <button class="btn-edit" onclick="editarProveedor(${p.id})">✏️ Editar</button>
                            <button class="btn-delete" onclick="eliminarProveedor(${p.id})">🗑️ Eliminar</button>
                        </div>
                    </div>
                `).join('');
            }
        }

        // Actualizar selector de proveedores
        const select = document.getElementById('proveedorFactura');
        if(!select) {
            console.error('ERROR: No se encontro el elemento #proveedorFactura en el DOM');
            return;
        }
        select.innerHTML = '<option value="">-- Seleccionar --</option>';
        if(proveedores && proveedores.length > 0) {
            proveedores.forEach(p => {
                const opt = document.createElement('option');
                opt.value = p.id;
                opt.textContent = p.nombre;
                select.appendChild(opt);
            });
        }
        
        // Alertas de vencimiento
        const hoy = new Date();
        const alertas = facturas.filter(f => !f.pagado).map(f => {
            const vencimiento = new Date(f.fechaVencimiento);
            const diasRestantes = Math.ceil((vencimiento - hoy) / (1000 * 60 * 60 * 24));
            return { factura: f, diasRestantes };
        }).filter(a => a.diasRestantes <= 7);
        
        const alertasDiv = document.getElementById('alertasVencimiento');
        if(alertas.length === 0) {
            alertasDiv.innerHTML = '<p style="text-align:center; color:#999;">Sin alertas de vencimiento</p>';
        } else {
            alertasDiv.innerHTML = alertas.map(a => {
                const proveedor = proveedores.find(p => p.id == a.factura.proveedorId);
                const color = a.diasRestantes <= 0 ? '#e74c3c' : '#f39c12';
                return `<div class="item" style="border-left-color: ${color};">
                    <div class="item-header">
                        <span class="item-name">${proveedor?.nombre || 'Desconocido'}</span>
                        <span class="item-quantity" style="background: ${color};">${a.diasRestantes <= 0 ? 'VENCIDO' : a.diasRestantes + ' días'}</span>
                    </div>
                    <div class="detail-row"><strong>Factura:</strong> ${a.factura.nroFactura}</div>
                    <div class="detail-row"><strong>Vencimiento:</strong> ${a.factura.fechaVencimiento}</div>
                    <div class="detail-row"><strong>Total:</strong> Bs. ${fM(a.factura.totalFactura || a.factura.total)}</div>
                </div>`;
            }).join('');
        }
        
        // Cuentas por pagar
        const cuentasDiv = document.getElementById('cuentasPorPagar');
        const cuentas = proveedores.map(p => {
            const facturasProveedor = facturas.filter(f => f.proveedorId == p.id && !f.pagado);
            const totalDeuda = facturasProveedor.reduce((sum, f) => sum + (f.totalFactura || f.total), 0);
            return { proveedor: p, totalDeuda, cantidad: facturasProveedor.length };
        }).filter(c => c.totalDeuda > 0);
        
        if(cuentas.length === 0) {
            cuentasDiv.innerHTML = '<p style="text-align:center; color:#999;">Sin cuentas pendientes</p>';
        } else {
            cuentasDiv.innerHTML = cuentas.map(c => `<div class="item">
                <div class="item-header">
                    <span class="item-name">${c.proveedor.nombre}</span>
                    <span class="item-quantity" style="background: var(--danger);">${c.cantidad} factura(s)</span>
                </div>
                <div class="detail-row"><strong>RIF:</strong> ${c.proveedor.rif}</div>
                <div class="detail-row"><strong>Vendedor:</strong> ${c.proveedor.vendedor}</div>
                <div class="detail-row" style="font-weight:bold; color:var(--danger);"><strong>Total Deuda:</strong> Bs. ${fM(c.totalDeuda)}</div>
            </div>`).join('');
        }
        
        // Historial de facturas
        const historialDiv = document.getElementById('historialFacturas');
        if(facturas.length === 0) {
            historialDiv.innerHTML = '<p style="text-align:center; color:#999;">Sin facturas registradas</p>';
        } else {
            historialDiv.innerHTML = facturas.map(f => {
                const proveedor = proveedores.find(p => p.id == f.proveedorId);
                const productosHtml = f.productos ? f.productos.map(p => `<div style="margin-left: 10px; font-size: 0.9rem;">• ${p.producto}: ${p.cantidad} x Bs. ${fM(p.costoUnitario)} = Bs. ${fM(p.total)}</div>`).join('') : `<div style="margin-left: 10px; font-size: 0.9rem;">• ${f.producto}: ${f.cantidad} x Bs. ${fM(f.costoUnitario)} = Bs. ${fM(f.total)}</div>`;
                const totalMonto = f.totalFactura || f.total;
                const ivaMonto = f.ivaTotal || f.iva || 0;
                return `<div class="item ${f.pagado ? 'anulada' : ''}">
                    <div class="item-header">
                        <span class="item-name">${proveedor?.nombre || 'Desconocido'} - ${f.nroFactura}</span>
                        <span class="item-quantity" style="background: ${f.pagado ? '#2ecc71' : '#e74c3c'};">${f.pagado ? 'PAGADA' : 'PENDIENTE'}</span>
                    </div>
                    <div class="detail-row"><strong>Productos:</strong></div>
                    ${productosHtml}
                    ${ivaMonto > 0 ? `<div class="detail-row"><strong>IVA Total (16%):</strong> Bs. ${fM(ivaMonto)}</div>` : ''}
                    <div class="detail-row" style="font-weight:bold; color:var(--primary);"><strong>Total:</strong> Bs. ${fM(totalMonto)}</div>
                    <div class="detail-row"><strong>Vencimiento:</strong> ${f.fechaVencimiento}</div>
                    <div class="item-actions">
                        ${!f.pagado ? `<button class="btn-add" onclick="marcarFacturaPagada(${f.id})" style="padding:3px 8px; font-size:0.7rem;">MARCAR PAGADA</button>` : ''}
                        <button class="btn-delete" onclick="eliminarFactura(${f.id})" style="padding:3px 8px; font-size:0.7rem;">ELIMINAR</button>
                    </div>
                </div>`;
            }).join('');
        }
    }

    // Eventos para cálculo automático
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('costoUnitarioFactura')?.addEventListener('input', calcularTotalFactura);
        document.getElementById('cantidadFactura')?.addEventListener('input', calcularTotalFactura);
        document.getElementById('ivaFactura')?.addEventListener('change', calcularTotalFactura);
        document.getElementById('monedaCostoFactura')?.addEventListener('change', calcularTotalFactura);
    });
    // init() es llamado por verificarLibrerias() una vez que Firebase y html5-qrcode están cargados

    // --- REGISTRO DE SERVICE WORKER PARA PWA ---
    
    if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
            navigator.serviceWorker.register('./sw.js').catch(err => console.log('SW error:', err));
        });
    }
);
    }

</script>
</body>
</html>
