name: Analizador Multirama con Gemini
on:
  issues:
    types: [opened]

jobs:
  gemini-analysis:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Descargar código de la rama actual
        uses: actions/checkout@v4
        with:
          # Esto le dice a GitHub que descargue la rama donde se originó el evento
          ref: ${{ github.ref }}

      - name: Analizar archivos con Gemini
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: true
        with:
          api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Actúa como un revisor de código experto. 
            Analiza los archivos (HTML, JS, CSS) de la rama actual para resolver este problema:
            "${{ github.event.issue.title }} - ${{ github.event.issue.body }}"

            Instrucciones:
            1. Identifica errores en cualquier archivo del repositorio.
            2. Explica la solución técnica en español.
            3. Proporciona el código corregido.

      - name: Publicar Comentario
        uses: peter-evans/create-or-update-comment@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ### 🤖 Revisión de IA en todas las ramas
            He revisado los archivos actuales de tu proyecto:
            
            ${{ steps.gemini.outputs.text }}
            
