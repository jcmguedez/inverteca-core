name: Analizador Multirama con Gemini
on:
  issues:
    types: [opened]

jobs:
  gemini-analysis:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - name: Descargar código de la rama actual
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref }}

      - name: Analizar archivos con Gemini
        id: gemini
        uses: google-github-actions/run-gemini-cli@v0
        env:
          GEMINI_CLI_TRUST_WORKSPACE: true
        with:
          gemini_api_key: ${{ secrets.GEMINI_API_KEY }}
          prompt: |
            Actúa como un revisor de código experto. 
            Analiza los archivos (HTML, JS, CSS) de este repositorio para resolver el siguiente problema reportado por el usuario:
            
            Título: "${{ github.event.issue.title }}"
            Descripción: "${{ github.event.issue.body }}"

            Instrucciones para tu respuesta:
            1. Resume el error encontrado en el código.
            2. Explica qué corregir basándote en los archivos del repositorio.
            3. Proporciona el bloque de código corregido.
            4. Responde siempre en español.

      - name: Publicar Comentario
        uses: peter-evans/create-or-update-comment@v3
        with:
          issue-number: ${{ github.event.issue.number }}
          body: |
            ### 🤖 Revisión de IA (Gemini)
            He analizado los archivos de tu proyecto y esto es lo que encontré:
            
            ${{ steps.gemini.outputs.text }}
            
